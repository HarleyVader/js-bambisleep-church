<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat | BambiSleep Church</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app-layout">

    <!-- LEFT: 3-D avatar column (outside the chat card) -->
    <aside class="avatar-column" id="avatar-column">

      <div class="avatar-stage">
        <!-- 3-D scene -->
        <div class="avatar-3d-scene" id="avatar-3d-scene">
          <div class="avatar-3d-body" id="avatar-3d-body">
            <div class="profile-avatar-wrap" id="profile-avatar-wrap">
              <img class="avatar-sprite" id="profile-avatar-sprite"
                   src="/avatars/b0-t1.svg" alt="avatar" />
              <div class="avatar-deco-layer" id="avatar-deco-layer"></div>
            </div>
          </div>
          <div class="avatar-shadow-floor"></div>
        </div>

        <!-- Nameplate -->
        <div class="avatar-nameplate">
          <div class="profile-name" id="profile-name">Anonymous</div>
          <div class="profile-title" id="profile-title">Bambi Bud</div>
          <div class="profile-status" id="profile-status">Ready to chat</div>
          <div class="profile-details">
            <span class="level-badge" id="level-badge">Lv 1</span>
            <span class="profile-detail" id="profile-role">Visitor</span>
          </div>
          <div class="xp-bar-wrap" id="xp-bar-wrap">
            <div class="xp-bar-fill" id="xp-bar-fill" style="width:0%"></div>
            <span class="xp-bar-label" id="xp-bar-label">0 / 50 XP</span>
          </div>
          <div class="prestige-badges" id="prestige-badges"></div>
          <button id="edit-profile" type="button">Edit Profile</button>
        </div>
      </div>

      <!-- Online users -->
      <div class="online-panel">
        <div class="online-panel-header">Online</div>
        <div class="online-users-list" id="online-users-list"></div>
      </div>

    </aside><!-- /.avatar-column -->

    <!-- RIGHT: chat -->
    <div class="chat-area">
      <div class="container">
        <div class="card">
          <header>
            <div>
              <h1>BambiSleep Church</h1>
              <p>Real-time chat with evolving bimbot avatars.</p>
            </div>
            <div class="status" id="status">Connecting&hellip;</div>
          </header>

          <div class="main-panel">
            <div id="messages" class="messages"></div>

            <form id="chat-form" class="form-row">
              <textarea id="message" placeholder="Write a message..." aria-label="Message"></textarea>
              <div class="controls">
                <input id="sender" type="text" placeholder="Your name (optional)" aria-label="Sender name" />
                <button type="submit">Send message</button>
              </div>
            </form>
          </div>
        </div>

        <footer>
          <p>Avatars evolve as you chat. Messages persist in MongoDB.</p>
        </footer>
      </div>
    </div><!-- /.chat-area -->

  </div><!-- /.app-layout -->

  <!-- Profile modal -->
  <div class="profile-modal" id="profile-modal" aria-hidden="true">
    <div class="profile-modal-panel" role="dialog" aria-modal="true" aria-labelledby="profile-modal-title">
      <div class="profile-modal-header">
        <h3 id="profile-modal-title">Edit Profile</h3>
        <button class="profile-modal-close" id="profile-modal-close" type="button">&times;</button>
      </div>
      <div class="modal-avatar-row">
        <div class="modal-avatar-wrap" id="modal-avatar-wrap">
          <img class="avatar-sprite" id="modal-avatar-sprite" src="/avatars/b0-t1.svg" alt="avatar preview" />
        </div>
        <button type="button" id="reroll-btn" class="reroll-btn">&#127922; Re-roll avatar</button>
      </div>
      <div class="palette-picker-label">Color palette</div>
      <div class="palette-picker" id="palette-picker"></div>
      <form id="profile-form">
        <div class="profile-modal-field">
          <label for="modal-name">Name</label>
          <input id="modal-name" name="name" type="text" placeholder="Your display name" />
        </div>
        <div class="profile-modal-field">
          <label for="modal-status">Status</label>
          <input id="modal-status" name="status" type="text" placeholder="Ready to chat" />
        </div>
        <div class="profile-modal-field">
          <label for="modal-role">Role</label>
          <input id="modal-role" name="role" type="text" placeholder="Visitor" />
        </div>
        <div class="profile-modal-actions">
          <button type="button" id="profile-cancel">Cancel</button>
          <button type="submit">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Level-up toast -->
  <div class="levelup-toast" id="levelup-toast" aria-live="polite"></div>

  <!-- Emoji picker -->
  <div class="emoji-picker" id="emoji-picker" hidden>
    <button data-emoji="&#128139;">&#128139;</button>
    <button data-emoji="&#128149;">&#128149;</button>
    <button data-emoji="&#127872;">&#127872;</button>
    <button data-emoji="&#10024;">&#10024;</button>
    <button data-emoji="&#127769;">&#127769;</button>
    <button data-emoji="&#127800;">&#127800;</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/chat.js"></script>
</body>
</html>
