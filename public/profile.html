<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bambi Profile | BambiSleep Church</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" />
  <link rel="stylesheet" href="/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three":           "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js",
      "three/addons/":   "https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/"
    }
  }
  </script>
</head>
<body class="profile-page">

  <nav class="site-nav">
    <a class="site-nav__brand" href="/">BambiSleep Church</a>
    <div class="site-nav__links">
      <a href="/">&#8592; Back to Chat</a>
      <a href="https://www.patreon.com/bambisleepchurch" target="_blank" rel="noopener">Patreon</a>
    </div>
  </nav>

  <!-- Gate overlay shown while checking access -->
  <div class="profile-gate" id="profile-gate">
    <div class="profile-gate-card">
      <div class="profile-gate-icon" id="gate-icon">&#128274;</div>
      <h2 class="profile-gate-title" id="gate-title">Loading…</h2>
      <p class="profile-gate-msg" id="gate-msg"></p>
      <a class="profile-gate-btn" href="https://www.patreon.com/bambisleepchurch"
         target="_blank" rel="noopener" id="gate-patreon-link" hidden>
        Become a Pink Poodle patron
      </a>
    </div>
  </div>

  <!-- Profile content (hidden until access confirmed) -->
  <div class="profile-content" id="profile-content" hidden>

    <div class="profile-hero">
      <!-- Three.js avatar -->
      <div class="avatar-3d-scene profile-avatar-scene" id="avatar-3d-scene"></div>

      <div class="profile-hero-info">
        <div class="profile-tier-badge" id="profile-tier-badge" hidden></div>
        <h1 class="profile-hero-name" id="profile-hero-name">…</h1>
        <div class="profile-hero-title" id="profile-hero-title"></div>

        <div class="profile-badges-row">
          <span class="level-badge" id="profile-level-badge">Lv 1</span>
          <div class="prestige-badges" id="profile-prestige-badges"></div>
        </div>

        <div class="xp-bar-wrap" id="profile-xp-wrap">
          <div class="xp-bar-fill" id="profile-xp-fill"></div>
          <span class="xp-bar-label" id="profile-xp-label">0 / 50 XP</span>
        </div>

        <div class="profile-stats profile-stats--hero" id="profile-stats-grid">
          <div class="pstat">
            <span class="pstat-val" id="pstat-messages">0</span>
            <span class="pstat-label">Messages</span>
          </div>
          <div class="pstat">
            <span class="pstat-val" id="pstat-words">0</span>
            <span class="pstat-label">Words</span>
          </div>
          <div class="pstat">
            <span class="pstat-val" id="pstat-days">0</span>
            <span class="pstat-label">Days Active</span>
          </div>
          <div class="pstat">
            <span class="pstat-val" id="pstat-reactions-given">0</span>
            <span class="pstat-label">Reactions Given</span>
          </div>
          <div class="pstat">
            <span class="pstat-val" id="pstat-reactions-received">0</span>
            <span class="pstat-label">Reactions Received</span>
          </div>
        </div>

        <div class="profile-last-seen" id="profile-last-seen"></div>
      </div>
    </div>

  </div><!-- /.profile-content -->

  <script type="module" src="/avatar3d.js"></script>
  <script>
  (function () {
    'use strict';

    const TOKEN_KEY = 'bimbot_token';
    const LEVEL_THRESHOLDS = [0, 0, 50, 150, 300, 500, 750, 1050, 1400, 1800, 2250];
    const MAX_LEVEL = 10;

    const gate        = document.getElementById('profile-gate');
    const gateIcon    = document.getElementById('gate-icon');
    const gateTitle   = document.getElementById('gate-title');
    const gateMsg     = document.getElementById('gate-msg');
    const gateLink    = document.getElementById('gate-patreon-link');
    const content     = document.getElementById('profile-content');

    function showGate(icon, title, msg, showLink) {
      gateIcon.textContent  = icon;
      gateTitle.textContent = title;
      gateMsg.textContent   = msg;
      gateLink.hidden       = !showLink;
      gate.hidden           = false;
      content.hidden        = true;
    }

    function esc(s) {
      return String(s || '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function xpForLevel(level) {
      return LEVEL_THRESHOLDS[Math.min(level, MAX_LEVEL)] || 0;
    }

    function relativeTime(dateStr) {
      if (!dateStr) return '';
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins  = Math.floor(diff / 60000);
      if (mins < 2)   return 'just now';
      if (mins < 60)  return `${mins} minutes ago`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours} hour${hours !== 1 ? 's' : ''} ago`;
      const days  = Math.floor(hours / 24);
      return `${days} day${days !== 1 ? 's' : ''} ago`;
    }

    function render(p) {
      gate.hidden    = true;
      content.hidden = false;

      // Avatar
      if (window._avatarViewer) {
        const av = p.avatar || {};
        window._avatarViewer.loadModel(
          av.baseVariant    || 0,
          Math.min(Math.max(p.progress?.prestige || 0, 0) + 1, 3),
          av.colorPaletteId || 1,
        );
      }

      // Name + title
      document.title = `${esc(p.username)} | BambiSleep Church`;
      document.getElementById('profile-hero-name').textContent  = p.username || 'Anonymous';
      document.getElementById('profile-hero-title').textContent = p.avatar?.title || 'Bambi Bud';

      // Level badge
      const lvl = p.progress?.level || 1;
      document.getElementById('profile-level-badge').textContent = `Lv ${lvl}`;

      // Prestige
      const prestige = p.progress?.prestige || 0;
      const prestigeEl = document.getElementById('profile-prestige-badges');
      prestigeEl.innerHTML = prestige > 0
        ? '\u2726'.repeat(Math.min(prestige, 5))
        : '';

      // XP bar
      const xp      = p.progress?.xp || 0;
      const nextXp  = xpForLevel(lvl + 1) - xpForLevel(lvl);
      const pct     = lvl >= MAX_LEVEL ? 100 : Math.min(100, Math.round((xp / nextXp) * 100));
      document.getElementById('profile-xp-fill').style.width  = `${pct}%`;
      document.getElementById('profile-xp-label').textContent = lvl >= MAX_LEVEL
        ? 'MAX LEVEL'
        : `${xp} / ${nextXp} XP`;

      // Stats
      const s = p.stats || {};
      document.getElementById('pstat-messages').textContent          = s.messagesCount     || 0;
      document.getElementById('pstat-words').textContent             = s.wordsCount        || 0;
      document.getElementById('pstat-days').textContent              = s.uniqueDaysActive  || 0;
      document.getElementById('pstat-reactions-given').textContent   = s.reactionsGiven    || 0;
      document.getElementById('pstat-reactions-received').textContent= s.reactionsReceived || 0;

      // Last seen
      const lsEl = document.getElementById('profile-last-seen');
      lsEl.textContent = p.lastSeen ? `Last seen ${relativeTime(p.lastSeen)}` : '';

      // Patreon tier badge
      const tierEl = document.getElementById('profile-tier-badge');
      if (p.patreon?.patronStatus === 'active_patron') {
        const label = p.patreon.tierName || 'Active Patron';
        tierEl.innerHTML    = `&#10022; ${esc(label)}`;
        tierEl.hidden       = false;
        tierEl.dataset.tier = label.toLowerCase().replace(/\s+/g, '-');
      }
    }

    async function load() {
      const params   = new URLSearchParams(location.search);
      const username = params.get('user') || '';

      if (!username) {
        showGate('&#10067;', 'No user specified', 'Add ?user=<username> to the URL.', false);
        return;
      }

      const token = (localStorage.getItem(TOKEN_KEY) || '').trim();
      if (!token) {
        showGate('&#128274;', 'Not logged in', 'Open the chat first to create your session, then come back.', false);
        return;
      }

      showGate('&#8987;', 'Loading…', '', false);

      try {
        const res = await fetch(
          `/api/user/profile/${encodeURIComponent(username)}?session=${encodeURIComponent(token)}`,
        );
        if (res.status === 401) {
          showGate('&#128274;', 'Not logged in', 'Open the chat first, then return here.', false);
          return;
        }
        if (res.status === 403) {
          showGate('&#128279;', 'Good Girl Required',
            'Profiles are available to Good Girl (and above) Patreon supporters.', true);
          return;
        }
        if (res.status === 404) {
          showGate('&#10067;', 'Bambi not found',
            `No bambi called "${username}" exists yet.`, false);
          return;
        }
        if (!res.ok) {
          showGate('&#9888;', 'Error', 'Something went wrong. Try again later.', false);
          return;
        }
        const profile = await res.json();
        render(profile);
      } catch {
        showGate('&#9888;', 'Network error', 'Could not reach the server.', false);
      }
    }

    // Wait for avatar viewer to be ready before loading
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', load);
    } else {
      load();
    }
  }());
  </script>
</body>
</html>
